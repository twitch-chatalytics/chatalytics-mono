server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://chatalytics-stack:5432/postgres
    username: postgres
    password: postgrespassword
  kafka:
    bootstrap-servers: chatalytics-stack:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
  otlp:
    metrics:
      export:
        url: http://signoz-otel-collector.signoz.svc.cluster.local:4318/v1/metrics
        step: 60s
        resource-attributes:
          service.name: ${OTEL_SERVICE_NAME:chatalytics-session-manager}
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

