apiVersion: v1
kind: Service
metadata:
  name: react-ui
  namespace: chatalytics
  labels:
    app.kubernetes.io/name: react-ui
    app.kubernetes.io/part-of: chatalytics
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: react-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-ui
  namespace: chatalytics
  labels:
    app.kubernetes.io/name: react-ui
    app.kubernetes.io/part-of: chatalytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: react-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: react-ui
        app.kubernetes.io/part-of: chatalytics
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: react-ui
          image: peavers/chatalytics-react-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
