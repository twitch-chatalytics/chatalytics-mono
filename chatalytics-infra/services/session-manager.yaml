apiVersion: v1
kind: Service
metadata:
  name: session-manager
  namespace: chatalytics
  labels:
    app.kubernetes.io/name: session-manager
    app.kubernetes.io/part-of: chatalytics
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: session-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-manager
  namespace: chatalytics
  labels:
    app.kubernetes.io/name: session-manager
    app.kubernetes.io/part-of: chatalytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: session-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: session-manager
        app.kubernetes.io/part-of: chatalytics
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: session-manager
          image: peavers/chatalytics-session-manager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: OTEL_SERVICE_NAME
              value: "chatalytics-session-manager"
          envFrom:
            - secretRef:
                name: chatalytics-secrets
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
