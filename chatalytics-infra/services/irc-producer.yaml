apiVersion: apps/v1
kind: Deployment
metadata:
  name: irc-producer
  namespace: chatalytics
  labels:
    app.kubernetes.io/name: irc-producer
    app.kubernetes.io/part-of: chatalytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: irc-producer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: irc-producer
        app.kubernetes.io/part-of: chatalytics
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: irc-producer
          image: peavers/chatalytics-irc-producer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVER_PORT
              value: "8080"
          envFrom:
            - secretRef:
                name: chatalytics-secrets
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
