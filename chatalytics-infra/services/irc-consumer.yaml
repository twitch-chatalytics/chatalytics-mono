apiVersion: apps/v1
kind: Deployment
metadata:
  name: irc-consumer
  namespace: chatalytics
  labels:
    app.kubernetes.io/name: irc-consumer
    app.kubernetes.io/part-of: chatalytics
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: irc-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: irc-consumer
        app.kubernetes.io/part-of: chatalytics
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: irc-consumer
          image: peavers/chatalytics-irc-consumer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: OTEL_SERVICE_NAME
              value: "chatalytics-irc-consumer"
          envFrom:
            - secretRef:
                name: chatalytics-secrets
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
