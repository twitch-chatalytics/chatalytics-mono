spring:
  data:
    redis:
      host: chatalytics-stack
      port: 6379
      database: 0
      timeout: 60000
      lettuce:
        pool:
          max-active: 32
          max-idle: 32
          min-idle: 0
          max-wait: -1ms

  kafka:
    bootstrap-servers: chatalytics-stack:9092
    consumer:
      group-id: chatalytics-api
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest

  datasource:
    url: jdbc:postgresql://chatalytics-stack:5432/postgres
    username: postgres
    password: postgrespassword
  liquibase:
    change-log: classpath:db/changelog.yml

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

twitch:
  client-id: ${TWITCH_CLIENT_ID:j9i0u85lh015x1b77yofg57lxx2mph}
  client-secret: ${TWITCH_CLIENT_SECRET:4eodxhvvcqldlopw0ld02gmwc9w9ix}

spring.security:
  oauth2:
    client:
      registration:
        twitch:
          client-id: ${TWITCH_CLIENT_ID:j9i0u85lh015x1b77yofg57lxx2mph}
          client-secret: ${TWITCH_CLIENT_SECRET:qn9xskzaos802z6pwngtxclv5ibo9z}
          authorization-grant-type: authorization_code
          client-authentication-method: client_secret_post
          redirect-uri: ${TWITCH_OAUTH_REDIRECT_URI:{baseUrl}/login/oauth2/code/twitch}
          scope: user:read:email
          client-name: Twitch
      provider:
        twitch:
          authorization-uri: https://id.twitch.tv/oauth2/authorize
          token-uri: https://id.twitch.tv/oauth2/token
          user-info-uri: https://api.twitch.tv/helix/users
          user-name-attribute: id

socialblade:
  clientid: ${SOCIALBLADE_CLIENT_ID:}
  token: ${SOCIALBLADE_TOKEN:}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}

server:
  servlet:
    session:
      timeout: 7d
      cookie:
        same-site: lax
        http-only: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
  otlp:
    metrics:
      export:
        url: http://signoz-otel-collector.signoz.svc.cluster.local:4318/v1/metrics
        step: 60s
        resource-attributes:
          service.name: ${OTEL_SERVICE_NAME:chatalytics-api}
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    org.jooq.tools.LoggerListener: DEBUG
    org.springframework.web: INFO
